<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Deera Robotics & AI - Coming Soon</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet" media="print" onload="this.media='all'">
    <link rel="stylesheet" href="styles.css">
    <script src="https://unpkg.com/lucide@latest/dist/umd/lucide.min.js"></script>
</head>
<body class="fade-in">
    <div id="stars-container"></div>
    <canvas id="tesseract-canvas"></canvas>
    
   

    <div class="content">
        <div class="logo" id="logo">Deera</div>
        <div class="tagline" id="tagline">Turning Ideas into Intelligent Creations</div>
        <div class="coming-soon" id="coming-soon">Coming Soon</div>
    </div>

<script>
        console.log('Canvas container exists:', document.getElementById('canvas-container') !== null);
        console.log('Three.js library loaded:', typeof THREE !== 'undefined');
    </script>
    <script src="script.js"></script>
    <script>
        function fadeNavigate(url) {
            document.body.classList.remove('fade-in');
            document.body.classList.add('fade-out');
            setTimeout(() => { window.location.href = url; }, 350);
        }
        window.addEventListener('DOMContentLoaded', () => {
            if (window.lucide) window.lucide.createIcons();
        });
    </script>
</body>
</html>
